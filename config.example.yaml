# Deliberate_Agents — Example Project Configuration
#
# Copy this file and customize for your project.
# See docs/CUSTOMIZATION.md for details on each setting.

project:
  name: "My Project"
  repo: "/path/to/my-project"
  worktrees: "/path/to/my-project-worktrees"
  main_branch: "main"
  dev_branch: "dev"
  initiatives_path: ".documentation/initiatives"

agents:
  max_concurrent_developers: 3
  poll_interval_seconds: 30
  autonomy: "full"  # full | semi | supervised
  verbose: true     # When true, agents emit step-by-step progress lines to stdout

orchestration:
  tmux_session: "deliberate-my-project"
  log_dir: ".deliberate/logs"
  report_interval_cycles: 10  # Post a full Slack report every N poll cycles
  wake_mode: "day"            # day = caffeinate (auto), night = pmset (requires sudo setup)

notifications:
  slack_enabled: false            # Set to true to enable Slack integration
  slack_bot_token: ""             # Bot User OAuth Token (xoxb-...) — or set SLACK_BOT_TOKEN env var
  slack_app_token: ""             # App-Level Token (xapp-...) for Socket Mode — or set SLACK_APP_TOKEN env var
  slack_webhook_url: ""           # Incoming Webhook URL (fallback for non-decision messages)
  slack_channel: "#dev-agents"    # Channel for notifications
  # See integrations/README.md for Slack app setup instructions

testing:
  command: "bin/rails test"
  system_test_command: "bin/rails test:system"

stack:
  language: "ruby"
  framework: "rails"
  css: "tailwindcss"
  js: "stimulus"
  design_tool: "claude-design"
