# Project Manager Agent Configuration

[behavior]
autonomy = "full"                # full | semi (pause at each step)
max_tasks_per_initiative = 20
max_retries_per_task = 2         # Re-assign a failed task this many times

[task_sizing]
# Guide for breaking down work
prefer_atomic = true             # One concern per task
max_files_per_task = 10          # Warn if a task touches more than this
require_test_criteria = true     # Every task must have testable acceptance criteria

[monitoring]
check_interval_seconds = 30      # How often to poll assignment statuses
stale_threshold_minutes = 45     # Flag a task if no heartbeat for this long

[validation]
require_passing_tests = true
require_clean_commits = true     # No WIP or fixup commits
require_branch_convention = true # Branch names must follow pattern
